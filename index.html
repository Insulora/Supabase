<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 TWOWAY CONTROL PANEL</title>
    <!-- 💡 正解：Supabase公式のJavaScriptライブラリを読み込みます -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { background: #0b0f19; color: #f3f4f6; font-family: 'Courier New', monospace; padding: 15px; margin: 0; }
        .frame { border: 2px solid #10b981; padding: 15px; border-radius: 8px; max-width: 400px; margin: 10px auto; background: #111827; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.5); }
        .title { color: #10b981; font-size: 18px; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #1f2937; padding-bottom: 5px; text-align: center; }
        .box { background: #1f2937; border: 1px solid #374151; padding: 15px; border-radius: 6px; margin-bottom: 15px; }
        .label { color: #9ca3af; font-size: 12px; margin-bottom: 4px; }
        .val { font-size: 26px; font-weight: bold; color: #ffffff; margin-bottom: 10px; }
        .noise { font-size: 26px; font-weight: bold; color: #10b981; }
        .status { display: inline-block; padding: 4px 12px; font-size: 14px; font-weight: bold; border-radius: 4px; text-transform: uppercase; }
        .pressed { background: #ef4444; color: #ffffff; animation: blink 0.5s infinite alternate; }
        .release { background: #4b5563; color: #d1d5db; }
        .btn-led { width: 100%; padding: 15px; font-size: 18px; font-weight: bold; color: #ffffff; background: #3b82f6; border: none; border-radius: 6px; cursor: pointer; box-shadow: 0 4px 0px #1d4ed8; transition: 0.1s; text-align: center; margin-top: 10px; }
        .btn-led:active { transform: translateY(4px); box-shadow: none; }
        .btn-led.active { background: #ef4444; box-shadow: 0 4px 0px #b91c1c; }
        .btn-led.active:active { box-shadow: none; }
        .sync-indicator { text-align: center; font-size: 11px; color: #6b7280; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .dot { width: 8px; h-eight: 8px; border-radius: 50%; background: #ef4444; display: inline-block; }
        .dot.online { background: #10b981; box-shadow: 0 0 8px #10b981; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.6; } }
    </style>
</head>
<body>

    <div class="frame">
        <div class="title">⚡ ESP32 INDUSTRIAL LIVE ⚡</div>
        
        <!-- モニタリングセクション -->
        <div class="box">
            <div class="label">EXTERNAL VOLTAGE</div>
            <div id="volt" class="val">--.--- V</div>
            
            <div class="label">POWER LINE NOISE</div>
            <div id="noise" class="noise">--.- mV</div>
        </div>

        <div class="box" style="display: flex; justify-content: space-between; align-items: center;">
            <span class="label" style="margin: 0;">BASE SWITCH(SW2)</span>
            <span id="sw" class="status release">OFFLINE</span>
        </div>

        <!-- 遠隔操作セクション -->
        <div class="box" style="background: #111c2e; border-color: #1e3a8a;">
            <div class="label" style="color: #60a5fa; text-align: center;">REMOTE TELEMETRY</div>
            <button id="ledBtn" class="btn-led" onclick="toggleRemoteLed()">SEND: LED ON</button>
        </div>

        <!-- 接続インジケーター -->
        <div class="sync-indicator">
            <span id="syncDot" class="dot"></span>
            <span id="syncText">CONNECTING TO SUPABASE...</span>
        </div>
    </div>

    <script>
        // 🛠️ あなたのSupabase情報を正確に入力してください
        const SUPABASE_URL = "https://pppwabefjkebcilpukgo.supabase.co";
        const SUPABASE_KEY = "sb_publishable_q8HYrvNgLEv92iiIDR7pAw_hO5D5HP-"

        let ledState = false;

        // 1. Supabaseクライアントの初期化（公式の正規手順）
        const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 2. WebSocketチャンネルの定義（ESP32と同じトピックを購読）
        const channel = supabase.channel('esp32-status', {
            config: { broadcast: { self: true } }
        });

        // 3. リアルタイムデータ受信イベントの登録
        channel
            .on('broadcast', { event: 'telemetry' }, (response) => {
                const data = response.payload;
                if (!data) return;

                // ESP32から届いたデータを画面に超高速（リアルタイム）反映
                document.getElementById('volt').innerText = `${data.volts.toFixed(3)} V`;
                document.getElementById('noise').innerText = `${data.noise.toFixed(1)} mV`;
                
                // ノイズ値に応じた色変更（警告エフェクト）
                const noiseEl = document.getElementById('noise');
                if (data.noise > 50.0) {
                    noiseEl.style.color = "#ef4444";
                } else {
                    noiseEl.style.color = "#10b981";
                }

                // スイッチ状態の更新
                const sw = document.getElementById('sw');
                if (data.pressed) {
                    sw.innerText = "PRESSED";
                    sw.className = "status pressed";
                } else {
                    sw.innerText = "RELEASE";
                    sw.className = "status release";
                }
            })
            .subscribe((status) => {
                const dot = document.getElementById('syncDot');
                const text = document.getElementById('syncText');
                
                if (status === 'SUBSCRIBED') {
                    // 接続成功時の緑ランプ点灯
                    dot.className = "dot online";
                    text.innerText = "SUPABASE LIVE CONNECTED";
                    document.getElementById('sw').innerText = "RELEASE";
                } else {
                    dot.className = "dot";
                    text.innerText = "CONNECTION ERROR";
                }
            });

        // 4. 遠隔操作ボタンを叩いた時、Broadcast命令を射出
        function toggleRemoteLed() {
            ledState = !ledState;
            const btn = document.getElementById('ledBtn');
            btn.innerText = ledState ? "SEND: LED OFF" : "SEND: LED ON";
            btn.className = ledState ? "btn-led active" : "btn-led";

            // 公式ライブラリの正しいBroadcast送信方法
            channel.send({
                type: 'broadcast',
                event: 'telemetry', // ESP32がレスポンスで監視しているイベント名に合わせます
                payload: { led_cmd: ledState }
            });
        }
    </script>
</body>
</html>
